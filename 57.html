<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powerful Tech Background</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#020617;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,Helvetica,sans-serif;
}

/* Animated Gradient */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 20%,#00e5ff33,transparent 40%),
    radial-gradient(circle at 80% 30%,#7b2cff33,transparent 40%),
    radial-gradient(circle at 50% 80%,#00ff8833,transparent 40%);
    animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
    from{
        transform:scale(1) rotate(0deg);
    }
    to{
        transform:scale(1.3) rotate(8deg);
    }
}

/* Grid */
.grid{
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(0,255,255,.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,.08) 1px, transparent 1px);
    background-size:50px 50px;
    transform:perspective(700px) rotateX(70deg);
    animation:gridMove 6s linear infinite;
}

@keyframes gridMove{
    from{
        background-position:0 0;
    }
    to{
        background-position:0 50px;
    }
}

/* Glowing circles */
.circle{
    position:absolute;
    border-radius:50%;
    border:2px solid cyan;
    box-shadow:0 0 30px cyan;
    animation:pulse 4s infinite;
}

.c1{
    width:250px;
    height:250px;
    top:15%;
    left:15%;
}

.c2{
    width:400px;
    height:400px;
    bottom:10%;
    right:10%;
    border-color:#00ff88;
    box-shadow:0 0 40px #00ff88;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
        opacity:.5;
    }
    50%{
        transform:scale(1.2);
        opacity:1;
    }
}

/* Moving Lines */
.line{
    position:absolute;
    width:2px;
    height:150px;
    background:linear-gradient(transparent,cyan,transparent);
    animation:fall linear infinite;
}

.line:nth-child(1){
    left:15%;
    animation-duration:4s;
}

.line:nth-child(2){
    left:35%;
    animation-duration:5s;
}

.line:nth-child(3){
    left:55%;
    animation-duration:3s;
}

.line:nth-child(4){
    left:75%;
    animation-duration:6s;
}

.line:nth-child(5){
    left:90%;
    animation-duration:4.5s;
}

@keyframes fall{
    from{
        top:-200px;
    }
    to{
        top:120%;
    }
}

/* Center Text */
.content{
    position:relative;
    z-index:10;
    text-align:center;
}

h1{
    font-size:70px;
    color:white;
    letter-spacing:5px;
    text-transform:uppercase;
    text-shadow:
    0 0 10px cyan,
    0 0 30px cyan,
    0 0 60px cyan;
}

p{
    color:#9bdcff;
    margin-top:15px;
    font-size:20px;
    letter-spacing:3px;
}
</style>

</head>

<body>

<div class="grid"></div>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="line"></div>
<div class="line"></div>
<div class="line"></div>
<div class="line"></div>
<div class="line"></div>

<div class="content">
    <h1>TECH WORLD</h1>
    <p>Artificial Intelligence • Cyber Security • Cloud • Future</p>
</div>

</body>
</html>
