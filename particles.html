<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  Bharath website </title>
    <style>
        /* Reset margins and hide scrollbars */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Canvas fits the entire screen */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay content on top of the particles */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            text-align: center;
            z-index: 2;
            pointer-events: none; /* Allows clicking through text */
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 500;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="content">
        <h1>Bharath weds Supriya.</h1>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // Resize canvas to fill the window
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Particle configuration
        const particlesArray = [];
        const numberOfParticles = 1500; // Increase for high-density particle clouds

        // Particle class definition
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5; // Small, fine particles
                
                // Speed and direction parameters
                this.speedX = (Math.random() * 0.4) - 0.2; 
                this.speedY = (Math.random() * 0.4) - 0.2;
                
                // Color variations: Shifting between deep blues and subtle purples
                const randomColor = Math.random();
                if (randomColor > 0.4) {
                    this.color = `rgba(26, 115, 232, ${Math.random() * 0.8 + 0.2})`; // Electric Blue
                } else {
                    this.color = `rgba(147, 51, 234, ${Math.random() * 0.6 + 0.2})`;  // Purple
                }
            }

            // Update particle position
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Loop particles back to the opposite side if they drift off-screen
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            // Draw particle on the canvas
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // Initialize particle field
        function init() {
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // Animation loop
        function animate() {
            // Semi-transparent clearing creates a subtle trailing/glowing effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
