<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Wave Particle Intro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            text-align: center;
            z-index: 2;
            width: 80%;
            pointer-events: none;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 500;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>

    <canvas id="geminiCanvas"></canvas>

    <div class="content">
        <h1>Building the world's most<br>capable AI assistant.</h1>
    </div>

    <script>
        const canvas = document.getElementById('geminiCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const particles = [];
        // High density count to get that granular, sand-like texture
        const totalParticles = 4000; 

        class WaveParticle {
            constructor() {
                this.reset();
                // Randomize initial placement so it doesn't just spawn from one edge
                this.x = Math.random() * canvas.width;
            }

            reset() {
                this.x = 0; 
                // Grouping them towards the center height, allowing them to expand outward
                this.baseY = canvas.height * 0.5 + (Math.random() * 100 - 50); 
                this.y = this.baseY;
                this.size = Math.random() * 1.2 + 0.3; // Super tiny particles
                this.speed = Math.random() * 1.5 + 0.5;
                
                // Mathematical wave offsets to create the "arc/tunnel" shape
                this.waveFrequency = 0.002;
                this.waveAmplitude = canvas.height * 0.35; // Controls the curve height

                // Color distribution (Mostly Electric Blue, accents of Deep Indigo/Purple)
                const colorPicker = Math.random();
                if (colorPicker > 0.3) {
                    this.color = `rgba(26, 115, 232, ${Math.random() * 0.6 + 0.3})`; // Blue
                } else if (colorPicker > 0.05) {
                    this.color = `rgba(138, 180, 248, ${Math.random() * 0.7 + 0.3})`; // Light blue shine
                } else {
                    this.color = `rgba(147, 51, 234, ${Math.random() * 0.5 + 0.2})`;  // Purple
                }
            }

            update() {
                this.x += this.speed;

                // Parabolic sine equation forces particles into the wide sweeping curve
                // Math.sin creates the giant upward bend seen in the Gemini UI
                this.y = this.baseY - Math.sin(this.x * this.waveFrequency) * this.waveAmplitude 
                         + Math.sin(this.x * 0.01) * 15; // Minor noise for texture depth

                // Reset particle when it leaves the screen to keep the wave infinite
                if (this.x > canvas.width) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // Generate the particle cloud
        for (let i = 0; i < totalParticles; i++) {
            particles.push(new WaveParticle());
        }

        function animate() {
            // Slight transparency on clean canvas creates a gorgeous motion blur/trail
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
